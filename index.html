    <style>

        /* 오른쪽 상단 초소형 언어 선택기 */
        .lang-picker {
            position: fixed; top: 15px; right: 15px; z-index: 9999;
            background: rgba(0,0,0,0.7); border: 1px solid var(--cyber);
            padding: 3px 8px; border-radius: 4px; box-shadow: 0 0 10px var(--cyber);
        }
        select { background: transparent; color: var(--cyber); border: none; font-size: 11px; cursor: pointer; outline: none; }

        header { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 1px solid var(--neon); }
        .glitch-logo { font-size: 4rem; font-weight: 900; color: var(--neon); text-shadow: 2px 2px var(--cyber); letter-spacing: 10px; }
        .slogan { font-size: 1.2rem; color: #888; margin-top: 20px; }
        .clock { font-size: 3rem; color: var(--cyber); margin-top: 30px; text-shadow: 0 0 20px var(--cyber); }

        .content { padding: 50px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
        .card { background: #111; padding: 30px; border: 1px solid #333; border-radius: 10px; transition: 0.3s; }
        .card:hover { border-color: var(--neon); box-shadow: 0 0 20px rgba(0,255,136,0.3); }
        .card h3 { color: var(--neon); margin-top: 0; }
        
        .footer-bank { border: 1px dashed var(--cyber); padding: 30px; margin: 50px auto; max-width: 900px; text-align: center; }
        footer { padding: 60px; background: #000; border-top: 1px solid #222; text-align: center; }
        .email { color: var(--neon); text-decoration: none; font-weight: bold; font-size: 1.2rem; text-shadow: 0 0 10px var(--neon); }
    </style>
</head>
