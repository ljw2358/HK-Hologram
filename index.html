<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hologram Phone</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at center, #1a0033, #000);
    color: white;
    overflow-x: hidden;
}

/* 배경 홀로그램 효과 */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, #7a00ff, transparent);
    animation: rotate 20s linear infinite;
    opacity: 0.2;
}

@keyframes rotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* 헤더 */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
    backdrop-filter: blur(10px);
}

.logo {
    font-size: 20px;
    font-weight: bold;
    color: #c084fc;
}

/* 언어 선택 */
select {
    background: transparent;
    color: white;
    border: 1px solid #c084fc;
    padding: 5px;
}

/* 메인 */
.main {
    text-align: center;
    padding: 60px 20px;
}

.main h1 {
    font-size: 42px;
    background: linear-gradient(90deg, #c084fc, #22d3ee);
    -webkit-background-clip: text;
    color: transparent;
}

.main p {
    margin-top: 15px;
    color: #ccc;
}

/* 버튼 */
.btn {
    margin-top: 30px;
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(90deg, #7a00ff, #00eaff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    box-shadow: 0 0 20px #7a00ff;
}

/* 홀로그램 디바이스 */
.device {
    margin: 60px auto;
    width: 250px;
    height: 500px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    position: relative;
    box-shadow: 0 0 40px rgba(122,0,255,0.6);
}

.holo {
    position: absolute;
    top: -150px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,255,255,0.8), transparent);
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0%,100% { transform: translate(-50%, 0); }
    50% { transform: translate(-50%, -20px); }
}

/* 기능 */
.features {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 15px;
    padding: 20px;
}

.card {
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    text-align: center;
}

/* 푸터 */
footer {
    text-align: center;
    padding: 20px;
    color: #aaa;
}
</style>
</head>

<body>

<header>
    <div class="logo">HK HOLOPHONE</div>
    <select id="lang">
        <option value="ko">한국어</option>
        <option value="en">English</option>
        <option value="zh">中文</option>
        <option value="ar">العربية</option>
    </select>
</header>

<section class="main">
    <h1 id="title">미래는 이미 시작됐다</h1>
    <p id="desc">손 위에 떠오르는 홀로그램 스마트폰</p>
    <button class="btn" id="btn">지금 체험하기</button>
</section>

<div class="device">
    <div class="holo"></div>
</div>

<section class="features">
    <div class="card" id="f1">3D 홀로그램 디스플레이</div>
    <div class="card" id="f2">AI 음성 인터페이스</div>
    <div class="card" id="f3">Web3 결제 지원</div>
    <div class="card" id="f4">초저전력 시스템</div>
</section>

<footer>
    © 2026 HK Hologram Tech
</footer>

<script>
// 다국어 데이터
const langData = {
    ko: {
        title: "미래는 이미 시작됐다",
        desc: "손 위에 떠오르는 홀로그램 스마트폰",
        btn: "지금 체험하기",
        f1: "3D 홀로그램 디스플레이",
        f2: "AI 음성 인터페이스",
        f3: "Web3 결제 지원",
        f4: "초저전력 시스템"
    },
    en: {
        title: "The Future Has Begun",
        desc: "A hologram smartphone in your hand",
        btn: "Try Now",
        f1: "3D Hologram Display",
        f2: "AI Voice Interface",
        f3: "Web3 Payment",
        f4: "Ultra Low Power"
    },
    zh: {
        title: "未来已经开始",
        desc: "掌上的全息手机",
        btn: "立即体验",
        f1: "3D全息显示",
        f2: "AI语音交互",
        f3: "Web3支付",
        f4: "超低功耗"
    },
    ar: {
        title: "المستقبل بدأ",
        desc: "هاتف هولوغرام في يدك",
        btn: "جرب الآن",
        f1: "عرض ثلاثي الأبعاد",
        f2: "واجهة صوتية AI",
        f3: "دفع Web3",
        f4: "طاقة منخفضة"
    }
};

// 언어 자동 감지
const userLang = navigator.language.slice(0,2);
const selectedLang = langData[userLang] ? userLang : "ko";
document.getElementById("lang").value = selectedLang;
updateLang(selectedLang);

// 언어 변경
document.getElementById("lang").addEventListener("change", e => {
    updateLang(e.target.value);
});

function updateLang(lang){
    const d = langData[lang];
    document.getElementById("title").innerText = d.title;
    document.getElementById("desc").innerText = d.desc;
    document.getElementById("btn").innerText = d.btn;
    document.getElementById("f1").innerText = d.f1;
    document.getElementById("f2").innerText = d.f2;
    document.getElementById("f3").innerText = d.f3;
    document.getElementById("f4").innerText = d.f4;
}
</script>

</body>
</html>
