<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>HK Holo-Projection v9.0</title>
    <style>
        :root {
            --holo-cyan: #00f2ff;
            --holo-pink: #ff00e1;
            --scan-line: rgba(0, 242, 255, 0.15);
            --bg-dark: #000000; /* 완전 검은색으로 변경 */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--holo-cyan);
            font-family: 'Malgun Gothic', 'Courier New', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* 3D 원근감 극대화 */
            perspective: 2000px; 
        }

        /* [핵심] 홀로그램 투영 베이스 */
        .holo-projector {
            position: relative;
            width: 400px;
            height: 600px;
            /* 위에서 아래로 원뿔형 빛의 기둥 효과 */
            background: 
                radial-gradient(ellipse at bottom, rgba(0, 242, 255, 0.2) 0%, transparent 70%),
                repeating-linear-gradient(0deg, transparent, transparent 2px, var(--scan-line) 2px, var(--scan-line) 4px);
            border-bottom: 2px solid var(--holo-cyan);
            border-radius: 20px 20px 0 0;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.3), inset 0 -20px 30px rgba(0, 242, 255, 0.1);
            
            /* 3D 각도 변경 (입체감) */
            transform: rotateX(25deg) rotateY(-5deg);
            transform-style: preserve-3d;
            transition: 0.3s ease-out;
            
            /* 스캔라인 애니메이션 */
            background-size: 100% 100%, 100% 4px;
        }

        /* 마우스 호버 시 입체 각도 변화 */
        .holo-projector:hover {
            transform: rotateX(15deg) rotateY(5deg) translateY(-20px);
            box-shadow: 0 0 80px rgba(0, 242, 255, 0.5);
        }

        /* 스캔바 애니메이션 효과 */
        .holo-projector::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 10px;
            background: rgba(0, 242, 255, 0.8);
            filter: blur(10px);
            animation: scanning 4s linear infinite;
        }

        @keyframes scanning {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* [요청 1] 언어 티커: 오른쪽 상단으로 이동 및 스타일 변경 */
        .lang-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            overflow: hidden;
            text-align: right;
            border-right: 1px solid rgba(255, 0, 225, 0.4);
            padding-right: 10px;
            transform: translateZ(50px); /* 화면 앞으로 튀어나오게 */
        }

        .ticker-text {
            font-size: 0.75rem;
            color: var(--holo-pink);
            text-shadow: 0 0 10px var(--holo-pink);
            white-space: nowrap;
            display: inline-block;
            animation: ticker-vertical 20s linear infinite;
        }

        @keyframes ticker-vertical {
            0% { transform: translateY(100%); }
            100% { transform: translateY(-100%); }
        }

        /* 중앙 정보 패널 */
        .main-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) translateZ(100px); /* 가장 앞으로 배치 */
            text-align: center;
            width: 80%;
        }

        .glitch-header {
            font-size: 1.1rem;
            letter-spacing: 5px;
            color: white;
            opacity: 0.9;
            text-shadow: 0 0 10px var(--holo-cyan);
            margin-bottom: 20px;
        }

        .time-display {
            font-size: 3.2rem;
            font-weight: bold;
            text-shadow: 0 0 20px var(--holo-cyan);
            font-family: 'Courier New', monospace; /* 기계적인 느낌 */
        }

        /* 중앙 홀로그램 원형 비주얼 */
        .core-orb {
            width: 180px;
            height: 180px;
            background: 
                radial-gradient(circle, var(--holo-cyan) 0%, transparent 60%),
                repeating-radial-gradient(circle, transparent, transparent 5px, rgba(0, 242, 255, 0.1) 5px, rgba(0, 242, 255, 0.1) 10px);
            border-radius: 50%;
            filter: blur(10px);
            animation: float 5s ease-in-out infinite alternate;
            margin: 30px auto;
            transform: translateZ(30px);
        }

        @keyframes float {
            from { transform: translateY(0) rotate(0deg); opacity: 0.5; }
            to { transform: translateY(-30px) rotate(10deg); opacity: 0.9; }
        }

        /* 하단 앱 독 */
        .app-dock {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%) translateZ(70px);
            display: flex;
            gap: 15px;
            padding: 10px 30px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 30px;
        }

        .app-icon {
            font-size: 1.5rem;
            cursor: pointer;
            transition: 0.3s;
            filter: drop-shadow(0 0 5px var(--holo-cyan));
        }

        .app-icon:hover {
            transform: scale(1.3) translateY(-10px);
            filter: drop-shadow(0 0 15px var(--holo-cyan));
        }
    </style>
</head>
<body>

    <div class="holo-projector">
        <div class="lang-corner">
            <div class="ticker-text">
                시스템 활성화<br>
                SYSTEM ACTIVE<br>
                系统已激活<br>
                システム起動<br>
                النظام نشط<br>
                सिस्टम सक्रिय है<br>
                SISTEMA ACTIVO<br>
                SISTEMA ATIVO<br>
                СИСТЕМА АКТИВНА<br>
                &nbsp;<br>
                시스템 활성화<br>
                SYSTEM ACTIVE<br>
                系统已激活<br>
                시스템起動<br>
                النظام نشط<br>
                सिस्टम सक्रिय है<br>
                SISTEMA ACTIVO<br>
                SISTEMA ATIVO<br>
                СИСТЕМА АКТИВНА
            </div>
        </div>

        <div class="main-display">
            <div class="glitch-header">HK GLOBAL NETWORK</div>
            <div class="time-display" id="clock">00:00:00</div>
            <div style="font-size: 0.7rem; color: #fff; opacity:0.6; margin-bottom: 20px;">ULSAN SECTOR 052</div>

            <div class="core-orb"></div>

            <p style="font-size: 0.9rem; color: var(--holo-pink); text-shadow: 0 0 10px var(--holo-pink);">QUANTUM ENCRYPTED</p>
        </div>

        <div class="app-dock">
            <div class="app-icon">🤖</div>
            <div class="app-icon">🛰️</div>
            <div class="app-icon">🔋</div>
            <div class="app-icon">🌐</div>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${h}:${m}:${s}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
