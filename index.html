<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK GLOBAL HOLOGRAM</title>
    <style>
        :root {
            --holo-cyan: #00f2ff;
            --holo-pink: #ff00e1;
            --bg-dark: #000000;
        }

        body {
            margin: 0;
            background-color: var(--bg-dark);
            color: var(--holo-cyan);
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            /* 공간감 깊게 설정 */
            perspective: 1500px; 
        }

        /* [핵심] 항상 기울어져 있는 홀로그램 바디 */
        .holo-frame {
            position: relative;
            width: 320px;
            height: 580px;
            border-left: 2px solid rgba(0, 242, 255, 0.3);
            border-right: 2px solid rgba(0, 242, 255, 0.1);
            background: linear-gradient(to bottom, rgba(0, 242, 255, 0.05), transparent);
            
            /* 영화처럼 삐딱하게 고정 */
            transform: rotateX(20deg) rotateY(-15deg) rotateZ(2deg);
            transform-style: preserve-3d;
            box-shadow: -20px 20px 50px rgba(0, 242, 255, 0.1);
            animation: vibe 4s ease-in-out infinite alternate;
        }

        /* 미세하게 흔들리는 애니메이션 (살아있는 홀로그램 느낌) */
        @keyframes vibe {
            from { transform: rotateX(20deg) rotateY(-15deg) translateY(0); }
            to { transform: rotateX(22deg) rotateY(-12deg) translateY(-10px); }
        }

        /* [요청 1] 우측 상단 세로 언어 티커 */
        .side-lang {
            position: absolute;
            top: 30px;
            right: -20px; /* 살짝 밖으로 튀어나오게 */
            height: 150px;
            width: 100px;
            overflow: hidden;
            border-right: 2px solid var(--holo-pink);
            transform: translateZ(50px);
        }

        .ticker-v {
            display: flex;
            flex-direction: column;
            animation: scroll-v 15s linear infinite;
        }

        .ticker-v span {
            font-size: 0.7rem;
            color: var(--holo-pink);
            text-align: right;
            padding: 5px;
            text-shadow: 0 0 8px var(--holo-pink);
            white-space: nowrap;
        }

        @keyframes scroll-v {
            0% { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* 중앙 메인 디스플레이 */
        .content {
            position: absolute;
            width: 100%;
            top: 50%;
            transform: translateY(-50%) translateZ(80px); /* 글자를 앞으로 띄움 */
            text-align: center;
        }

        .title {
            font-size: 1rem;
            letter-spacing: 3px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .clock {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 0 20px var(--holo-cyan), 0 0 40px var(--holo-cyan);
            margin: 20px 0;
        }

        /* 입체 구체 (빛 덩어리) */
        .orb {
            width: 150px;
            height: 150px;
            margin: 0 auto;
            background: radial-gradient(circle, var(--holo-cyan) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(15px);
            opacity: 0.6;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            from { transform: scale(1); opacity: 0.4; }
            to { transform: scale(1.2); opacity: 0.8; }
        }

        /* 하단 바 */
        .bottom-info {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            transform: translateZ(30px);
        }

        .app-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        .icon {
            width: 40px;
            height: 40px;
            border: 1px solid var(--holo-cyan);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 242, 255, 0.1);
        }
    </style>
</head>
<body>

    <div class="holo-frame">
        <div class="side-lang">
            <div class="ticker-v">
                <span>시스템 활성화</span><span>SYSTEM ACTIVE</span><span>系统已激活</span>
                <span>시스템起動</span><span>النظام نشط</span><span>सिस्टम सक्रिय है</span>
                <span>SISTEMA ACTIVO</span><span>SISTEMA ATIVO</span><span>СИСТЕМА АКТИВНА</span>
                <span>시스템 활성화</span><span>SYSTEM ACTIVE</span><span>系统已激活</span>
                <span>시스템起動</span><span>النظام نشط</span><span>सिस्टम सक्रिय है</span>
                <span>SISTEMA ACTIVO</span><span>SISTEMA ATIVO</span><span>СИСТЕМА АКТИВНА</span>
            </div>
        </div>

        <div class="content">
            <div class="title">HK GLOBAL NETWORK</div>
            <div class="clock" id="clock">00:00:00</div>
            <div class="orb"></div>
            <div style="color: var(--holo-pink); font-size: 0.8rem; letter-spacing: 2px;">QUANTUM SECURED</div>
        </div>

        <div class="bottom-info">
            <div style="font-size: 0.6rem; opacity: 0.5;">SECTOR: ULSAN_052</div>
            <div class="app-icons">
                <div class="icon">🤖</div>
                <div class="icon">🛰️</div>
                <div class="icon">🔋</div>
                <div class="icon">🌐</div>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = 
                now.getHours().toString().padStart(2, '0') + ":" +
                now.getMinutes().toString().padStart(2, '0') + ":" +
                now.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
